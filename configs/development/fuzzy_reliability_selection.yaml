experiment_name: fuzzy_reliability_gate_development_selection
output_dir: results/development/fuzzy_reliability_selection
runtime:
  torch_threads: 1
  torch_interop_threads: 1
  workers: 8
  allow_dirty_execution_inputs: true
seeds: [0, 1, 2, 3, 4]
evaluation:
  interval_steps: 2000
  episodes: 30
analysis:
  primary_metric: return_auc
  analysis_status: development_only_not_confirmatory
  selection_rule: >
    Select tau from {5, 20, 80} by the lowest average rank of return AUC
    across the three environments; break exact ties by the largest pooled
    paired mean difference from count gating.
  planned_contrasts:
    - name: fuzzy_relative_tau_5_vs_count
      left: fuzzy_relative_tau_5
      right: count_gate_tau_20
      metric: return_auc
    - name: fuzzy_relative_tau_20_vs_count
      left: fuzzy_relative_tau_20
      right: count_gate_tau_20
      metric: return_auc
    - name: fuzzy_relative_tau_80_vs_count
      left: fuzzy_relative_tau_80
      right: count_gate_tau_20
      metric: return_auc
envs:
  - name: FrozenLake-4x4-slippery-development
    id: FrozenLake-v1
    kwargs:
      map_name: 4x4
      is_slippery: true
    training_steps: 10000
    max_steps: 100
    success_mode: positive_terminal
  - name: CliffWalking-development
    id: CliffWalking-v1
    training_steps: 10000
    max_steps: 500
    success_mode: terminated
  - name: FourRooms-9-support-shift-development
    id: StructuredFourRooms-v0
    kwargs:
      size: 9
      goal_split: train
      slip_probability: 0.1
      max_steps: 160
    eval_kwargs:
      goal_split: test
    training_steps: 12000
    max_steps: 160
    success_mode: positive_terminal
agents:
  - name: count_gate_tau_20
    kind: count_gated
    params: &common
      double_dqn: false
      learning_rate: 0.0003
      tabular_learning_rate: 0.2
      batch_size: 32
      replay_capacity: 100000
      replay_warmup: 512
      train_frequency: 16
      target_update_interval: 500
      hidden_size: 128
      tau: 20
      fuzzy_tau_support: 20
      epsilon_decay_steps: 10000
  - name: original_fuzzy_tau_20
    kind: fuzzy_support_adaptive_gate
    params:
      <<: *common
      fuzzy_uncertainty_scale: 1.0
      fuzzy_abstain_zero_support: false
  - name: fuzzy_relative_tau_5
    kind: fuzzy_risk_aware_gate
    params:
      <<: *common
      fuzzy_tau_support: 5
      fallback_policy: no_hold
  - name: fuzzy_relative_tau_20
    kind: fuzzy_risk_aware_gate
    params:
      <<: *common
      fuzzy_tau_support: 20
      fallback_policy: no_hold
  - name: fuzzy_relative_tau_80
    kind: fuzzy_risk_aware_gate
    params:
      <<: *common
      fuzzy_tau_support: 80
      fallback_policy: no_hold
