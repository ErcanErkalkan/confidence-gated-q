experiment_name: pybullet_uav_sensorized_motor_control_30seed
output_dir: results/uav_sensorized_motor_validation
runtime:
  torch_threads: 1
  torch_interop_threads: 1
  workers: 8
seeds: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009, 1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019, 1020, 1021, 1022, 1023, 1024, 1025, 1026, 1027, 1028, 1029]
evaluation:
  interval_steps: 2000
  episodes: 15
analysis:
  primary_metric: risk_adjusted_score
  analysis_status: main_sensorized_motor_control_sil_validation
  risk_objective: J_risk = success_rate - collision_rate - 0.05 * idle_rate
  planned_contrasts:
    - name: double_dqn_vs_dqn
      left: double_dqn
      right: dqn
      metric: risk_adjusted_score
    - name: fuzzy_reliability_vs_dqn
      left: fuzzy_reliability
      right: dqn
      metric: risk_adjusted_score
    - name: fuzzy_reliability_vs_sensorized_controller
      left: fuzzy_reliability
      right: sensorized_controller
      metric: risk_adjusted_score
envs:
  - name: Crazyflie-sensorized-motor-control-shift
    id: SensorizedPyBulletUAVWaypoint-v0
    kwargs:
      target_split: train
      physics: pyb
      pyb_freq: 240
      ctrl_freq: 60
      action_repeat: 1
      max_steps: 240
      collective_delta_rpm: 220
      tilt_radians: 0.10
      goal_tolerance: 0.16
      state_quantization: 0.05
      lidar_range: 1.2
      lidar_noise_std: 0.01
      vio_position_noise_std: 0.015
      vio_velocity_noise_std: 0.025
      imu_attitude_noise_std: 0.008
      localization_latency_steps: 2
      localization_dropout_probability: 0.02
      range_dropout_probability: 0.01
      sensor_bias_walk_std: 0.0005
      camera_fov_degrees: 100
      camera_dropout_probability: 0.02
      initial_position_jitter: 0.02
      initial_attitude_jitter: 0.01
      wind_force_std: 0.0
      lambda_collision: 1.0
      lambda_idle: 0.05
    eval_kwargs:
      target_split: deployment
      physics: pyb_gnd_drag_dw
      lidar_noise_std: 0.02
      vio_position_noise_std: 0.02
      vio_velocity_noise_std: 0.03
      imu_attitude_noise_std: 0.008
      localization_latency_steps: 2
      localization_dropout_probability: 0.03
      range_dropout_probability: 0.02
      sensor_bias_walk_std: 0.0007
      camera_dropout_probability: 0.05
      initial_position_jitter: 0.04
      initial_attitude_jitter: 0.03
      wind_force_std: 0.002
    training_steps: 6000
    max_steps: 240
    success_mode: positive_terminal
agents:
  - name: sensorized_controller
    kind: uav_sensorized_motor_controller
    params: {}
  - name: dqn
    kind: dqn
    params:
      double_dqn: false
      learning_rate: 0.0005
      batch_size: 64
      replay_capacity: 100000
      replay_warmup: 256
      train_frequency: 4
      target_update_interval: 250
      hidden_size: 128
      epsilon_decay_steps: 5000
  - name: double_dqn
    kind: double_dqn
    params:
      learning_rate: 0.0005
      batch_size: 64
      replay_capacity: 100000
      replay_warmup: 256
      train_frequency: 4
      target_update_interval: 250
      hidden_size: 128
      epsilon_decay_steps: 5000
  - name: fuzzy_reliability
    kind: fuzzy_reliability_gate
    params:
      double_dqn: true
      learning_rate: 0.0005
      tabular_learning_rate: 0.2
      batch_size: 64
      replay_capacity: 100000
      replay_warmup: 256
      train_frequency: 4
      target_update_interval: 250
      hidden_size: 128
      fuzzy_tau_support: 4
      fuzzy_abstain_zero_support: false
      epsilon_decay_steps: 5000
